services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: lead_intelligence
      POSTGRES_USER: lead_intelligence
      POSTGRES_PASSWORD: lead_intelligence
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev -- --hostname 0.0.0.0

volumes:
  postgres_data:
